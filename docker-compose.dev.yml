services:
  db:
    image: postgres:17-alpine
    container_name: project-a-postgre-sql
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: project_a
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - project-a
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  test-db:
    container_name: project-a-postgre-sql-test
    image: postgres:17-alpine
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: project_a_test
    networks:
      - project-a
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  mail-dev:
    image: maildev/maildev:latest
    container_name: project-a-mail-dev
    restart: always
    ports:
      - "1025:1025"
      - "1080:1080"
    networks:
      - project-a

networks:
  project-a:
    driver: bridge

volumes:
  postgres-data: